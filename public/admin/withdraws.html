<!DOCTYPE html>
<html>
<head>
<title>Withdraws</title>

<style>
body {
  font-family:Segoe UI;
  background: linear-gradient(135deg,#ff7e5f,#feb47b);
  color:white;
  padding:20px;
}

table {
  width:100%;
  background: rgba(255,255,255,0.1);
}

th,td { padding:12px; }

button {
  background:red;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
}
</style>
</head>

<body>

<h2>💸 Withdraws</h2>

<table>
<thead>
<tr>
<th>User</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const token = localStorage.getItem("adminToken");

async function load(){
  const res = await fetch("/api/admin/withdraws",{
    headers:{Authorization:"Bearer "+token}
  });

  const data = await res.json();
  const table = document.getElementById("table");
  table.innerHTML="";

  data.forEach(w=>{
    table.innerHTML += `
    <tr>
      <td>${w.userId?.phone}</td>
      <td>₹${w.amount}</td>
      <td>${w.status}</td>
      <td>
        ${w.status==="Pending" ? 
        `<button onclick="approve('${w._id}')">Approve</button>` 
        : "Done"}
      </td>
    </tr>`;
  });
}

async function approve(id){
  await fetch("/api/admin/withdraw/approve/"+id,{
    method:"POST",
    headers:{Authorization:"Bearer "+token}
  });
  load();
}

load();

</script>

</body>
</html>
