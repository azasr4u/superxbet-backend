<h2>Referral Bonus</h2>

<div class="card">
<input id="uid" placeholder="User ID"><br><br>
<input id="amt" placeholder="Amount"><br><br>

<button onclick="add()">Add</button>
</div>

<script>

async function add(){
await fetch(API+"/admin/bonus",{
method:"POST",
headers:authHeaders(),
body: JSON.stringify({
userId: uid.value,
amount: amt.value
})
});
alert("Done");
}

</script>
