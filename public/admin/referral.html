<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Referral Panel</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
}

.sidebar {
  width:240px;
  height:100vh;
  background: linear-gradient(180deg,#5f2c82,#49a09d);
  padding:20px;
}

.menu a {
  display:block;
  padding:12px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
}

.active {
  background:rgba(255,255,255,0.3);
}

.main {
  flex:1;
  padding:30px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.1);
}

th, td {
  padding:12px;
  text-align:center;
}

th {
  background:rgba(0,0,0,0.2);
}

.btn {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  margin:2px;
  cursor:pointer;
}

.green { background:green; color:white; }
.red { background:red; color:white; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>SuperXbet</h2>

  <a href="/admin/dashboard.html">Dashboard</a>

  <a href="/admin/deposits.html">Deposits</a>
  <a href="/admin/withdraws.html">Withdraws</a>

  <a href="/admin/kyc.html">KYC</a>
  <a href="/admin/referral.html">Referral</a>

  <a href="/admin/upi.html">UPI</a>
  <a href="/admin/mqr.html">MQR</a>
  <a href="/admin/bank.html">Bank</a>

  <a href="/admin/agents.html">Agents</a>

  <a href="/admin/score.html">Score Panel</a>
  <a href="/admin/bets.html">Bets</a>
</div>

<div class="main">
  <h2>Referral System</h2>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Referred By</th>
        <th>Deposit</th>
        <th>Bonus</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="data"></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("adminToken");

async function load(){

  const res = await fetch("/api/admin/referrals",{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  let html = "";

  data.forEach(r=>{

    html += `
      <tr>
        <td>${r.phone}</td>
        <td>${r.referredBy}</td>
        <td>${r.hasDeposited ? "Yes" : "No"}</td>
        <td>${r.bonusGiven ? "Given" : "Pending"}</td>
        <td>
          ${
            r.hasDeposited && !r.bonusGiven ? `
            <button class="btn green" onclick="approve('${r.userId}')">Approve</button>
            <button class="btn red" onclick="reject('${r.userId}')">Reject</button>
            ` : "-"
          }
        </td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

async function approve(id){
  await fetch("/api/admin/referral/approve/"+id,{
    method:"POST",
    headers:{ Authorization:"Bearer "+token }
  });
  load();
}

async function reject(id){
  await fetch("/api/admin/referral/reject/"+id,{
    method:"POST",
    headers:{ Authorization:"Bearer "+token }
  });
  load();
}

load();
</script>

</body>
</html>
