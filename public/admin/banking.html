<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banking System</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
  padding:30px;
}

h2 { margin-bottom:20px; }

input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ff7e5f;
  color:white;
}

table {
  width:100%;
  margin-top:20px;
  background:rgba(255,255,255,0.1);
}

td, th {
  padding:10px;
  text-align:center;
}
</style>
</head>

<body>

<h2>🏦 Banking System</h2>

<h3>Add UPI</h3>
<input id="upi" placeholder="Enter UPI ID">
<button onclick="addUpi()">Add</button>

<h3>UPI List</h3>
<table>
<thead><tr><th>UPI ID</th></tr></thead>
<tbody id="upiTable"></tbody>
</table>

<script>
const token = localStorage.getItem("adminToken");

async function load(){
  const res = await fetch("/api/admin/upi", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  let html = "";

  data.forEach(u=>{
    html += `<tr><td>${u.upi}</td></tr>`;
  });

  document.getElementById("upiTable").innerHTML = html;
}

async function addUpi(){
  const upi = document.getElementById("upi").value;

  await fetch("/api/admin/upi",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({ upi })
  });

  load();
}

load();
</script>

</body>
</html>
