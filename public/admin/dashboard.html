<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  background: linear-gradient(180deg,#5f2c82,#49a09d);
  padding:20px;
  position:fixed;
}

.sidebar h2 {
  margin-bottom:30px;
}

.menu a {
  display:block;
  padding:14px;
  margin-bottom:10px;
  color:white;
  text-decoration:none;
  border-radius:10px;
  transition:0.3s;
}

.menu a:hover {
  background:rgba(255,255,255,0.2);
}

.active {
  background:rgba(255,255,255,0.3);
}

/* MAIN */
.main {
  margin-left:240px;
  width:100%;
  padding:20px;
}

/* TOPBAR */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logout {
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff7e5f,#feb47b);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

/* CARDS (GLASS EFFECT) */
.card {
  padding:25px;
  border-radius:15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.title {
  font-size:14px;
  opacity:0.8;
}

.value {
  font-size:30px;
  font-weight:bold;
  margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SuperXbet</h2>

  <div class="menu">
    <a class="active">Dashboard</a>
    <a href="/admin/users.html">Users</a>
    <a href="/admin/deposits.html">Deposits</a>
    <a href="/admin/withdraws.html">Withdraws</a>
    <a href="/admin/bets.html">Bets</a>
    <a href="/admin/odds.html">Match Control</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOP -->
  <div class="topbar">
    <h2>📊 Admin Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- CARDS -->
  <div class="grid">
    <div class="card">
      <div class="title">Users</div>
      <div id="users" class="value">0</div>
    </div>

    <div class="card">
      <div class="title">Deposits</div>
      <div id="dep" class="value">₹0</div>
    </div>

    <div class="card">
      <div class="title">Withdraws</div>
      <div id="with" class="value">₹0</div>
    </div>

    <div class="card">
      <div class="title">Profit</div>
      <div id="profit" class="value">₹0</div>
    </div>
  </div>

</div>

<script>

// AUTH
const token = localStorage.getItem("adminToken");
if (!token) window.location.href = "/admin/login.html";

// LOGOUT
function logout(){
  localStorage.removeItem("adminToken");
  window.location.href = "/admin/login.html";
}

// LOAD DATA
async function loadDashboard(){
  const res = await fetch("/api/admin/dashboard", {
    headers: { Authorization: "Bearer " + token }
  });

  const d = await res.json();

  document.getElementById("users").innerText = d.users || 0;
  document.getElementById("dep").innerText = "₹" + (d.deposits || 0);
  document.getElementById("with").innerText = "₹" + (d.withdraws || 0);
  document.getElementById("profit").innerText =
    "₹" + ((d.deposits || 0) - (d.withdraws || 0));
}

setInterval(loadDashboard,3000);
loadDashboard();

</script>

</body>
</html>
