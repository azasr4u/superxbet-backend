<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body { background:#000; color:white; font-family:Arial; }
    .card {
      border:1px solid cyan;
      padding:20px;
      margin:20px;
      box-shadow:0 0 10px cyan;
    }
  </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="card">
  Total Users: <span id="users">0</span>
</div>

<div class="card">
  Total Deposits: ₹<span id="deposits">0</span>
</div>

<script>
const API = "https://superxbet-backend.onrender.com/api";

async function load(){

  const res = await fetch(API + "/admin/dashboard", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("adminToken")
    }
  });

  const data = await res.json();

  users.innerText = data.users || 0;
  deposits.innerText = data.deposits || 0;
}

load();
</script>

</body>
</html>
