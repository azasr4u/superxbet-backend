<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  font-family:Segoe UI;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
}

.value {
  font-size:26px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>📊 Dashboard</h2>

<div class="grid">
  <div class="card"><div>Users</div><div id="users" class="value"></div></div>
  <div class="card"><div>Deposits</div><div id="dep" class="value"></div></div>
  <div class="card"><div>Withdraws</div><div id="withdraw" class="value"></div></div>
  <div class="card"><div>Profit</div><div id="profit" class="value"></div></div>
</div>

<script>
const token = localStorage.getItem("adminToken");

async function load(){
  const res = await fetch("/api/admin/dashboard",{headers:{Authorization:"Bearer "+token}});
  const d = await res.json();

  users.innerText = d.users;
  dep.innerText = "₹"+d.deposits;
  withdraw.innerText = "₹"+d.withdraws;
  profit.innerText = "₹"+(d.deposits-d.withdraws);
}
load();
</script>

</body>
</html>
