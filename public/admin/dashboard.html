<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  background: linear-gradient(180deg,#5f2c82,#49a09d);
  padding:20px;
  position:fixed;
}

.menu a {
  display:block;
  padding:14px;
  margin-bottom:10px;
  color:white;
  text-decoration:none;
  border-radius:10px;
}

.active {
  background:rgba(255,255,255,0.3);
}

/* MAIN */
.main {
  margin-left:240px;
  width:100%;
  padding:40px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:800px;
}

/* CARD */
.card {
  padding:25px;
  border-radius:15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
}

.value {
  font-size:28px;
  font-weight:bold;
}

/* TABLE */
table {
  width:100%;
  margin-top:40px;
  border-collapse:collapse;
  background:rgba(255,255,255,0.1);
}

th, td {
  padding:12px;
  text-align:center;
}

th {
  background:rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>SuperXbet</h2>
  <div class="menu">
    <a class="active">Dashboard</a>
    <a href="/admin/users.html">Users</a>
    <a href="/admin/deposits.html">Deposits</a>
    <a href="/admin/withdraws.html">Withdraws</a>
    <a href="/admin/bets.html">Bets</a>
    <a href="/admin/odds.html">Match Control</a>
  </div>
</div>

<div class="main">

  <h2>📊 Admin Dashboard</h2>

  <div class="grid">
    <div class="card">
      <div>Users</div>
      <div id="users" class="value">0</div>
    </div>

    <div class="card">
      <div>Deposits</div>
      <div id="dep" class="value">₹0</div>
    </div>

    <div class="card">
      <div>Withdraws</div>
      <div id="with" class="value">₹0</div>
    </div>

    <div class="card">
      <div>Profit</div>
      <div id="profit" class="value">₹0</div>
    </div>
  </div>

  <!-- 🔥 USER DETAILS TABLE -->
  <table>
    <thead>
      <tr>
        <th>Phone</th>
        <th>Wallet</th>
        <th>Wager Left</th>
        <th>Bonus</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

</div>

<script>
const token = localStorage.getItem("adminToken");

if (!token) {
  window.location.href = "/admin/login.html";
}

async function loadDashboard(){
  const res = await fetch("/api/admin/dashboard", {
    headers: { Authorization: "Bearer " + token }
  });

  const d = await res.json();

  // ✅ FIXED VALUES
  document.getElementById("users").innerText = d.totalUsers || 0;
  document.getElementById("dep").innerText = "₹" + (d.totalDeposits || 0);
  document.getElementById("with").innerText = "₹" + (d.totalWithdraws || 0);

  document.getElementById("profit").innerText =
    "₹" + ((d.totalDeposits || 0) - (d.totalWithdraws || 0));

  // 🔥 USER TABLE
  let html = "";

  d.users?.forEach(u => {
    html += `
      <tr>
        <td>${u.phone}</td>
        <td>₹${u.wallet}</td>
        <td>₹${u.wageringLeft}</td>
        <td>₹${u.bonus}</td>
      </tr>
    `;
  });

  document.getElementById("userTable").innerHTML = html;
}

setInterval(loadDashboard, 5000);
loadDashboard();
</script>

</body>
</html>
