<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  background: linear-gradient(180deg,#5f2c82,#49a09d);
  padding:20px;
  position:fixed;
}

.sidebar h2 {
  margin-bottom:20px;
}

.menu a {
  display:block;
  padding:12px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
  border-radius:8px;
  transition:0.3s;
}

.menu a:hover {
  background:rgba(255,255,255,0.2);
}

.active {
  background:rgba(255,255,255,0.3);
}

/* MAIN */
.main {
  margin-left:240px;
  width:100%;
  padding:30px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.1);
}

th, td {
  padding:12px;
  text-align:center;
}

th {
  background:rgba(0,0,0,0.2);
}

/* BUTTONS */
.btn {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  margin:2px;
  cursor:pointer;
}

.green { background:green; color:white; }
.red { background:red; color:white; }
.blue { background:#2196f3; color:white; }
.orange { background:orange; color:white; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SuperXbet</h2>

  <div class="menu">
    <a class="active">Dashboard</a>

    <a href="/admin/deposits.html">Deposits</a>
    <a href="/admin/withdraws.html">Withdraws</a>

    <a href="/admin/kyc.html">KYC</a>
    <a href="/admin/referral.html">Referral</a>

    <a href="/admin/upi.html">UPI</a>
    <a href="/admin/mqr.html">MQR</a>
    <a href="/admin/bank.html">Bank Accounts</a>

    <a href="/admin/agents.html">Agents</a>
    <a href="/admin/settings.html">Settings</a>

    <a href="/admin/score.html">Score Panel</a>
    <a href="/admin/bets.html">Bets</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <h2>📊 Dashboard</h2>

  <table>
    <thead>
      <tr>
        <th>Phone</th>
        <th>Wallet</th>
        <th>Deposits</th>
        <th>Withdraws</th>
        <th>Wager Left</th>
        <th>Bonus</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="data"></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("adminToken");

if (!token) {
  window.location.href = "/admin/login.html";
}

async function load(){

  const res = await fetch("/api/admin/dashboard", {
    headers:{ Authorization:"Bearer "+token }
  });

  const d = await res.json();

  let html = "";

  d.users.forEach(u => {

    html += `
    <tr>
      <td>${u.phone}</td>
      <td>₹${u.wallet}</td>
      <td>₹${u.totalDeposits}</td>
      <td>₹${u.totalWithdraws}</td>
      <td>₹${u.wageringLeft}</td>
      <td>₹${u.bonus}</td>
      <td>
        <button class="btn green">+Balance</button>
        <button class="btn blue">Bonus</button>
        <button class="btn orange">Reject</button>
        <button class="btn red">Block</button>
      </td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

load();
</script>

</body>
</html>
