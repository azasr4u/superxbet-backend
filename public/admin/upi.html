<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UPI Panel</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#4facfe;
  color:white;
}

.main {
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

input {
  padding:10px;
  border:none;
  border-radius:6px;
}

button {
  padding:10px;
  margin-top:20px;
  border:none;
  border-radius:6px;
  background:green;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="sidebar">
  <h2>SuperXbet</h2>

  <a href="/admin/dashboard.html">Dashboard</a>

  <a href="/admin/deposits.html">Deposits</a>
  <a href="/admin/withdraws.html">Withdraws</a>

  <a href="/admin/kyc.html">KYC</a>
  <a href="/admin/referral.html">Referral</a>

  <a href="/admin/upi.html">UPI</a>
  <a href="/admin/mqr.html">MQR</a>
  <a href="/admin/bank.html">Bank</a>

  <a href="/admin/agents.html">Agents</a>

  <a href="/admin/score.html">Score Panel</a>
  <a href="/admin/bets.html">Bets</a>
</div>

<div class="main">
  <h2>UPI IDs (100 Boxes)</h2>

  <div class="grid" id="grid"></div>

  <button onclick="save()">Save All</button>
</div>

<script>
const token = localStorage.getItem("adminToken");

// CREATE 100 INPUTS
for(let i=0;i<100;i++){
  const input = document.createElement("input");
  input.placeholder = "UPI ID";
  input.id = "upi_"+i;
  grid.appendChild(input);
}

// LOAD EXISTING
async function load(){
  const res = await fetch("/api/admin/upi",{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  data.forEach((u,i)=>{
    const el = document.getElementById("upi_"+i);
    if(el) el.value = u.upiId;
  });
}

// SAVE ALL
async function save(){

  let upiList = [];

  for(let i=0;i<100;i++){
    const val = document.getElementById("upi_"+i).value;
    upiList.push(val);
  }

  await fetch("/api/admin/upi/save",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({ upiList })
  });

  alert("Saved");
}

load();
</script>

</body>
</html>
