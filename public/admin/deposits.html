<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deposits</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
}

.sidebar {
  width:240px;
  height:100vh;
  background: linear-gradient(180deg,#5f2c82,#49a09d);
  padding:20px;
  position:fixed;
}

.menu a {
  display:block;
  padding:12px;
  margin-bottom:8px;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.active {
  background:rgba(255,255,255,0.3);
}

.main {
  margin-left:240px;
  width:100%;
  padding:30px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.1);
}

th, td {
  padding:12px;
  text-align:center;
}

th {
  background:rgba(0,0,0,0.2);
}

.pending { color:yellow; }
.approved { color:lime; }
.rejected { color:red; }

.btn {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:2px;
}

.green { background:green; color:white; }
.red { background:red; color:white; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>SuperXbet</h2>

  <a href="/admin/dashboard.html">Dashboard</a>

  <a href="/admin/deposits.html" class="active">Deposits</a>
  <a href="/admin/withdraws.html">Withdraws</a>

  <a href="/admin/kyc.html">KYC</a>
  <a href="/admin/referral.html">Referral</a>

  <a href="/admin/upi.html">UPI</a>
  <a href="/admin/mqr.html">MQR</a>
  <a href="/admin/bank.html">Bank</a>

  <a href="/admin/agents.html">Agents</a>

  <a href="/admin/score.html">Score Panel</a>
  <a href="/admin/bets.html">Bets</a>
</div>

<div class="main">
  <h2>💰 Deposits</h2>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Amount</th>
        <th>Method</th>
        <th>UTR</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="data"></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("adminToken");

if (!token) {
  window.location.href = "/admin/login.html";
}

async function load(){
  try {
    const res = await fetch("/api/admin/deposits", {
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      }
    });

    const data = await res.json();

    if (!Array.isArray(data)) {
      alert("Failed to load deposits");
      return;
    }

    let html = "";

    data.forEach(d => {

      const status = (d.status || "").toLowerCase();

      html += `
        <tr>
          <td>${d.user?.phone || "N/A"}</td>
          <td>₹${d.amount}</td>
          <td>${d.paymentMethod || "-"}</td>
          <td>${d.utr || "-"}</td>
          <td class="${status}">${d.status}</td>
          <td>
            ${
              status === "pending" ? `
              <button class="btn green" onclick="approve('${d._id}')">Approve</button>
              <button class="btn red" onclick="reject('${d._id}')">Reject</button>
              ` : "-"
            }
          </td>
        </tr>
      `;
    });

    document.getElementById("data").innerHTML = html;

  } catch (e) {
    alert("Error loading deposits");
    console.error(e);
  }
}

async function approve(id){
  if (!confirm("Approve deposit?")) return;

  try {
    const res = await fetch("/api/admin/deposit/approve/"+id,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      }
    });

    const data = await res.json();

    alert(data.message || "Approved");
    load();

  } catch (e) {
    alert("Approve failed");
  }
}

async function reject(id){
  if (!confirm("Reject deposit?")) return;

  try {
    const res = await fetch("/api/admin/deposit/reject/"+id,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      }
    });

    const data = await res.json();

    alert(data.message || "Rejected");
    load();

  } catch (e) {
    alert("Reject failed");
  }
}

load();
</script>

</body>
</html>
