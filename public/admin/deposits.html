<!DOCTYPE html>
<html>
<head>
  <title>Deposits</title>

  <style>
    body { background:#000; color:white; font-family:Arial; }
    .card {
      border:1px solid cyan;
      padding:15px;
      margin:10px;
      box-shadow:0 0 10px cyan;
    }
    button {
      border:1px solid cyan;
      background:black;
      color:cyan;
      padding:6px;
    }
  </style>
</head>

<body>

<h2>Deposit Requests</h2>
<div id="list"></div>

<script>
const API = "https://superxbet-backend.onrender.com/api";

async function load(){

  const res = await fetch(API + "/admin/deposits", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("adminToken")
    }
  });

  const data = await res.json();

  list.innerHTML = data.map(d => `
    <div class="card">
      ₹${d.amount} <br>
      UTR: ${d.utr}
      <br><br>
      <button onclick="approve('${d._id}')">Approve</button>
    </div>
  `).join("");
}

async function approve(id){
  await fetch(API + "/admin/deposit/approve/" + id, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("adminToken")
    }
  });

  load();
}

load();
</script>

</body>
</html>
