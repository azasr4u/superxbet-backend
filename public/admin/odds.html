<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Match Control</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background: linear-gradient(135deg,#4facfe,#8f94fb);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  background: linear-gradient(180deg,#5f2c82,#49a09d);
  padding:20px;
  position:fixed;
}

.menu a {
  display:block;
  padding:14px;
  margin-bottom:10px;
  color:white;
  text-decoration:none;
  border-radius:10px;
}

.active {
  background:rgba(255,255,255,0.3);
}

/* MAIN */
.main {
  margin-left:240px;
  padding:40px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.15);
  padding:25px;
  border-radius:15px;
  backdrop-filter: blur(12px);
  max-width:500px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button {
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(135deg,#ff7e5f,#feb47b);
  color:white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>SuperXbet</h2>
  <div class="menu">
    <a href="/admin/dashboard.html">Dashboard</a>
    <a href="/admin/deposits.html">Deposits</a>
    <a href="/admin/withdraws.html">Withdraws</a>
    <a href="/admin/bets.html">Bets</a>
    <a class="active">Match Control</a>
  </div>
</div>

<div class="main">
  <h2>🎮 Match Control</h2>

  <div class="card">
    <input id="match" placeholder="Match Name">
    <input id="teamA" placeholder="Team A">
    <input id="teamB" placeholder="Team B">
    <input id="oddsA" placeholder="Odds Team A">
    <input id="oddsB" placeholder="Odds Team B">

    <button onclick="save()">Save Match</button>
    <button onclick="result()">Set Result</button>
  </div>
</div>

<script>
const token = localStorage.getItem("adminToken");
if (!token) window.location.href = "/admin/login.html";

// LOAD CURRENT MATCH
async function load(){
  try {
    const res = await fetch("/api/admin/match/current", {
      headers:{ Authorization:"Bearer "+token }
    });

    const d = await res.json();

    if(d){
      document.getElementById("match").value = d.match || "";
      document.getElementById("teamA").value = d.teamA || "";
      document.getElementById("teamB").value = d.teamB || "";
      document.getElementById("oddsA").value = d.oddsA || "";
      document.getElementById("oddsB").value = d.oddsB || "";
    }
  } catch(e){
    console.log(e);
  }
}


// SAVE MATCH
async function save(){

  const match = document.getElementById("match").value;
  const teamA = document.getElementById("teamA").value;
  const teamB = document.getElementById("teamB").value;
  const oddsA = Number(document.getElementById("oddsA").value);
  const oddsB = Number(document.getElementById("oddsB").value);

  // VALIDATION
  if(!match || !teamA || !teamB){
    alert("Fill all fields");
    return;
  }

  if(isNaN(oddsA) || isNaN(oddsB)){
    alert("Invalid odds");
    return;
  }

  await fetch("/api/admin/match/control",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({
      match,
      teamA,
      teamB,
      oddsA,
      oddsB
    })
  });

  alert("Match Updated ✅");
}


// SET RESULT
async function result(){

  const winner = prompt("Enter winner team name exactly");

  if(!winner){
    alert("Cancelled");
    return;
  }

  await fetch("/api/admin/match/result",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({ winner })
  });

  alert("Match Result Set ✅");
}

load();
</script>

</body>
</html>
