<!DOCTYPE html>
<html>
<head>
<title>Match Control</title>

<style>
body {
  font-family:Segoe UI;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🎮 Match Control</h2>

<div>
  <button onclick="send(1)">1</button>
  <button onclick="send(2)">2</button>
  <button onclick="send(4)">4</button>
  <button onclick="send(6)">6</button>
  <button onclick="send('wicket')">Wicket</button>
</div>

<h3 id="score"></h3>
<h3 id="odds"></h3>

<script>

const token = localStorage.getItem("adminToken");

async function send(action){
  const res = await fetch("/api/admin/score/update",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({action})
  });

  const d = await res.json();

  score.innerText = `Score: ${d.match.score}/${d.match.wickets}`;
  odds.innerText = `Odds: ${d.odds.teamA} / ${d.odds.teamB}`;
}

</script>

</body>
</html>
