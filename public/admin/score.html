<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Score Control</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#1e1e2f;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  background:#111;
  padding:20px;
}

.sidebar a {
  display:block;
  padding:10px;
  margin-bottom:10px;
  color:white;
  text-decoration:none;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* CARD */
.card {
  background:#2c2c3e;
  padding:20px;
  border-radius:10px;
  max-width:600px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* BUTTONS */
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.run { background:green; }
.extra { background:orange; }
.wicket { background:red; }

/* DISPLAY */
.display {
  font-size:20px;
  margin:10px 0;
}
</style>
</head>

<body onload="init()">

<div class="sidebar">
  <h2>SuperXbet</h2>

  <a href="/admin/dashboard.html">Dashboard</a>

  <a href="/admin/deposits.html">Deposits</a>
  <a href="/admin/withdraws.html">Withdraws</a>

  <a href="/admin/kyc.html">KYC</a>
  <a href="/admin/referral.html">Referral</a>

  <a href="/admin/upi.html">UPI</a>
  <a href="/admin/mqr.html">MQR</a>
  <a href="/admin/bank.html">Bank</a>

  <a href="/admin/agents.html">Agents</a>

  <a href="/admin/score.html">Score Panel</a>
  <a href="/admin/bets.html">Bets</a>
</div>

<div class="main">

<h2>🏏 Live Score Control</h2>

<div class="card">

<!-- MATCH INFO -->
<input id="matchName" placeholder="Match">
<input id="teamA" placeholder="Team A">
<input id="teamB" placeholder="Team B">

<input id="target" placeholder="Target">
<select id="innings">
  <option value="1">1st Innings</option>
  <option value="2">2nd Innings</option>
</select>

<!-- LIVE DISPLAY -->
<div class="display">
  Score: <span id="scoreDisplay">0/0</span><br>
  Overs: <span id="oversDisplay">0.0</span>
</div>

<!-- RUN BUTTONS -->
<h3>Runs</h3>
<button class="run" onclick="send('run',1)">+1</button>
<button class="run" onclick="send('run',2)">+2</button>
<button class="run" onclick="send('run',3)">+3</button>
<button class="run" onclick="send('run',4)">+4</button>
<button class="run" onclick="send('run',6)">+6</button>

<!-- EXTRAS -->
<h3>Extras</h3>
<button class="extra" onclick="send('wide')">Wide</button>
<button class="extra" onclick="send('noball')">No Ball</button>

<!-- WICKETS -->
<h3>Wicket</h3>
<button class="wicket" onclick="send('wicket')">Wicket</button>

<!-- ODDS -->
<h3>Odds</h3>
<div id="odds"></div>

</div>

</div>

<script>
const API = "/api";
const token = localStorage.getItem("adminToken");

function headers(){
  return {
    "Content-Type":"application/json",
    "Authorization":"Bearer "+token
  };
}

// INIT
function init(){
  loadMatch();
  setInterval(loadMatch, 2000);
}

// LOAD MATCH
async function loadMatch(){
  const res = await fetch(API+"/admin/match",{headers:headers()});
  const m = await res.json();

  if(!m) return;

  matchName.value = m.matchName || "";
  teamA.value = m.teamA || "";
  teamB.value = m.teamB || "";
  target.value = m.target || 0;
  innings.value = m.innings || 1;

  document.getElementById("scoreDisplay").innerText =
    (m.score || 0) + "/" + (m.wickets || 0);

  document.getElementById("oversDisplay").innerText =
    m.overs || "0.0";

  document.getElementById("odds").innerText =
    (m.teamA || "A") + ": " + (m.oddsA || 50) + "% | " +
    (m.teamB || "B") + ": " + (m.oddsB || 50) + "%";
}

// SEND EVENT
async function send(type, value=0){

  await fetch(API+"/admin/match/update",{
    method:"POST",
    headers:headers(),
    body:JSON.stringify({
      type,
      value,
      matchName: matchName.value,
      teamA: teamA.value,
      teamB: teamB.value,
      target: Number(target.value),
      innings: Number(innings.value)
    })
  });

  loadMatch();
}
</script>

</body>
</html>
