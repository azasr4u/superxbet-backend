<!DOCTYPE html>
<html>
<head>
<title>Users</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.container {
  padding:20px;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:12px;
  text-align:left;
}

th {
  background: rgba(255,255,255,0.2);
}

tr {
  background: rgba(255,255,255,0.05);
  margin-bottom:10px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.block { background:#ff4d4d; color:white; }
.unblock { background:#4CAF50; color:white; }
.kyc { background:#2196F3; color:white; }
.balance { background:#ff9800; color:white; }

</style>
</head>

<body>

<div class="container">

<h2>👥 Users Control</h2>

<table>
<thead>
<tr>
<th>Phone</th>
<th>Balance</th>
<th>Status</th>
<th>KYC</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="users"></tbody>

</table>

</div>

<script>

const token = localStorage.getItem("adminToken");

// LOAD USERS
async function loadUsers() {
  const res = await fetch("/api/admin/users", {
    headers:{ Authorization:"Bearer "+token }
  });

  const users = await res.json();

  const tbody = document.getElementById("users");
  tbody.innerHTML = "";

  users.forEach(u => {

    tbody.innerHTML += `
    <tr>
      <td>${u.phone}</td>
      <td>₹${u.walletBalance || 0}</td>

      <td>${u.blocked ? "Blocked" : "Active"}</td>

      <td>${u.kycVerified ? "Verified" : "Pending"}</td>

      <td>
        <button class="${u.blocked ? "unblock":"block"}"
        onclick="blockUser('${u._id}', ${!u.blocked})">
        ${u.blocked ? "Unblock":"Block"}
        </button>

        <button class="kyc"
        onclick="kycUser('${u._id}', ${!u.kycVerified})">
        ${u.kycVerified ? "Unverify" : "Verify"}
        </button>

        <button class="balance"
        onclick="updateBalance('${u._id}')">
        Balance
        </button>
      </td>
    </tr>
    `;
  });
}


// BLOCK USER
async function blockUser(id, status){
  await fetch("/api/admin/user/block",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({ userId:id, blocked:status })
  });

  loadUsers();
}


// KYC TOGGLE
async function kycUser(id, status){
  await fetch("/api/admin/user/kyc",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({ userId:id, status })
  });

  loadUsers();
}


// BALANCE UPDATE
async function updateBalance(id){
  let amount = prompt("Enter amount (+/-)");

  if (!amount) return;

  amount = Number(amount);

  if (isNaN(amount)) {
    alert("Invalid amount");
    return;
  }

  await fetch("/api/admin/user/balance",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({ userId:id, amount })
  });

  loadUsers();
}


loadUsers();

</script>

</body>
</html>
